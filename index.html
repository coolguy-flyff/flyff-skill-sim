<!DOCTYPE html>
<html lang="en">

        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Skill Simulator for Flyff Universe" />
        <meta property="og:title" content="Skill Simulator for Flyff Universe" />

        <script type="application/ld+json">

                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "Skill Simulator for Flyff Universe",
                "url": "https://flyff-skill-sim.pages.dev/",
                "description": "Plan your Flyff Universe build across every 1st, 2nd, and 3rd class tree, with master variations and shareable URLs.",

                "browserRequirements": "Requires JavaScript. Requires a modern browser.",
                "isAccessibleForFree": true,
                "inLanguage": ["en", "de", "fr", "es", "zh"],

                    "@type": "VideoGame",

                    "genre": "MMORPG"

        <link rel="preload" as="fetch" href="/data/class.json" crossorigin="anonymous" />
        <link rel="preload" as="fetch" href="/data/skill.json" crossorigin="anonymous" />
        <link rel="preload" as="fetch" href="/data/parameter-labels.json" crossorigin="anonymous" />

        <link rel="stylesheet" href="/data/skill.css" />
        <link rel="stylesheet" href="/data/class.css" />
        <title>Skill Simulator for Flyff Universe</title>

        <div id="root"></div>
